name: CI

on:
  push:
    branches:
      - main
      - "ticket/**"
  pull_request:
    branches:
      - main

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: site

      - name: Type and Astro check
        run: npm run check
        working-directory: site

      - name: Production build
        run: npm run build
        working-directory: site

      - name: Dist integrity checks
        run: ./scripts/check_dist_integrity.sh

      - name: Gallery readiness (allow missing in CI)
        run: ./scripts/check_gallery_assets.sh --allow-missing
