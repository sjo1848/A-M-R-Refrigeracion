name: amr-refrigeracion

services:
  web:
    build:
      context: ./site
      dockerfile: Dockerfile
      target: dev
    working_dir: /app
    command: >
      sh -lc "
      npm install --no-audit --no-fund &&
      npm run dev:host
      "
    ports:
      - "4321:4321"
    volumes:
      - ./site:/app
      - amr_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    restart: unless-stopped

volumes:
  amr_node_modules:
